services:
  mysql-maintainer:
    build: .
    container_name: mysql-maintainer
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      SQLITE_DB_PATH: /app/data/mysql-maintainer.db
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ./db_backups:/var/db_backups
      - sqlite-data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql-maintainer-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql-data:
  sqlite-data:

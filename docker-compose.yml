services:
  mysql-maintainer:
    build: .
    container_name: mysql-maintainer
    env_file:
      - .env
    environment:
      NODE_ENV: development
      SQLITE_DB_PATH: /app/data/mysql-maintainer.db
    ports:
      - "${SERVER_PORT:-27168}:27168"
    volumes:
      - ./db_backups:/app/db_backups
      - sqlite-data:/app/data
    restart: unless-stopped

volumes:
  sqlite-data:
